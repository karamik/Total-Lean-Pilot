[profile.default]
# --- Compiler Settings ---
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

# Solidity 0.8.26 с максимальной оптимизацией runtime gas
solc = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000  # Максимум для частых вызовов claim()

# EVM Shanghai — PUSH0 снижает gas на ~2% за deployment
evm_version = "shanghai"

# Gas reports для FeeSplitter и ProverRegistry
gas_reports = ["FeeSplitter", "ProverRegistry"]

# --- Testing ---
fuzz = { runs = 10_000, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 32 }
ffi = true
verbosity = 3

# --- Formatter ---
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true

# --- CI Profile (быстрые тесты) ---
[profile.ci]
fuzz = { runs = 1_000 }
invariant = { runs = 64, depth = 16 }
verbosity = 2
threads = 4

# --- Security Audit Profile ---
[profile.security]
fuzz = { runs = 100_000, max_test_rejects = 1_000_000 }
invariant = { runs = 1024, depth = 64 }
memory_limit = 4294967296  # 4GB

# --- Gas Analysis Profile ---
[profile.gas]
optimizer = true
optimizer_runs = 1_000_000
gas_reports = ["*"]
verbosity = 4

# --- Documentation ---
[doc]
out = "docs/generated"
title = "Total Lean Pilot Contracts"
book = true
