
version: '3.8'

services:
  # Execution Node 1 (Bootnode)
  total-geth-1:
    build:
      context: ../../execution
      dockerfile: Dockerfile
    container_name: total-geth-1
    ports:
      - "8545:8545"   # RPC
      - "8546:8546"   # WS
      - "30303:30303" # P2P
    volumes:
      - geth-data-1:/data
    environment:
      - NODE_ID=1
      - SIGNER=0xSigner111111111111111111111111111111111111
      - BOOTNODES=
    command: >
      --datadir /data
      --networkid 888888
      --port 30303
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api eth,net,web3,clique,admin
      --ws
      --ws.addr 0.0.0.0
      --ws.port 8546
      --ws.api eth,net,web3
      --mine
      --miner.etherbase 0xSigner111111111111111111111111111111111111
      --unlock 0xSigner111111111111111111111111111111111111
      --password /data/password.txt
      --allow-insecure-unlock
      --nodiscover
      --ipcdisable
    networks:
      - total-pilot

  # Execution Node 2
  total-geth-2:
    build:
      context: ../../execution
      dockerfile: Dockerfile
    container_name: total-geth-2
    ports:
      - "8547:8545"
      - "30304:30303"
    volumes:
      - geth-data-2:/data
    environment:
      - NODE_ID=2
      - SIGNER=0xSigner222222222222222222222222222222222222
    command: >
      --datadir /data
      --networkid 888888
      --port 30303
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api eth,net,web3,clique
      --mine
      --miner.etherbase 0xSigner222222222222222222222222222222222222
      --unlock 0xSigner222222222222222222222222222222222222
      --password /data/password.txt
      --allow-insecure-unlock
      --bootnodes enode://<BOOTNODE_1_ENODE>@total-geth-1:30303
      --ipcdisable
    networks:
      - total-pilot
    depends_on:
      - total-geth-1

  # Execution Node 3
  total-geth-3:
    build:
      context: ../../execution
      dockerfile: Dockerfile
    container_name: total-geth-3
    ports:
      - "8548:8545"
      - "30305:30303"
    volumes:
      - geth-data-3:/data
    environment:
      - NODE_ID=3
      - SIGNER=0xSigner333333333333333333333333333333333333
    command: >
      --datadir /data
      --networkid 888888
      --port 30303
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api eth,net,web3,clique
      --mine
      --miner.etherbase 0xSigner333333333333333333333333333333333333
      --unlock 0xSigner333333333333333333333333333333333333
      --password /data/password.txt
      --allow-insecure-unlock
      --bootnodes enode://<BOOTNODE_1_ENODE>@total-geth-1:30303
      --ipcdisable
    networks:
      - total-pilot
    depends_on:
      - total-geth-1

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: total-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - total-pilot

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: total-grafana
    ports:
      - "3000:3000"
    volumes:
      - ../monitoring/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - total-pilot
    depends_on:
      - prometheus

volumes:
  geth-data-1:
  geth-data-2:
  geth-data-3:
  prometheus-data:
  grafana-data:

networks:
  total-pilot:
    driver: bridge
